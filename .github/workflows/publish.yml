name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Publish
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          pnpm publish --access public --no-git-checks
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      # lsp/ is a separate published package (@almadar/orb-lsp) managed within
      # the same workflow.
      - name: Install lsp/ dependencies
        working-directory: lsp
        # lsp/ ships no pnpm-lock.yaml (never migrated to pnpm) → frozen install
        # aborts with ERR_PNPM_NO_LOCKFILE. Resolve fresh instead.
        run: pnpm install --no-frozen-lockfile

      - name: Build lsp/
        working-directory: lsp
        run: pnpm build

      - name: Publish lsp/ (@almadar/orb-lsp)
        working-directory: lsp
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@almadar/orb-lsp@$VERSION" version >/dev/null 2>&1; then
            echo "@almadar/orb-lsp@$VERSION already published — skipping (idempotent)."
          else
            pnpm publish --access public
          fi
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
