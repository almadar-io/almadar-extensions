name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: pnpm install --no-frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Publish
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          pnpm publish --access public --no-git-checks
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      # lsp/ is a separate published package (@almadar/orb-lsp) — it uses npm
      # (not pnpm) as its own package manager, with its own package-lock.json,
      # so it isn't reachable via the pnpm workspace/publish above.
      - name: Install lsp/ dependencies
        working-directory: lsp
        run: npm ci

      - name: Build lsp/
        working-directory: lsp
        run: npm run build

      - name: Publish lsp/ (@almadar/orb-lsp)
        working-directory: lsp
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          npm publish --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
